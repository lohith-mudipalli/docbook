spring.application.name=docbook

# Server
server.port=8080

# MySQL (values come from env variables)
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:docbook_db}
spring.datasource.username=${DB_USER:docbook_user}
spring.datasource.password=${DB_PASSWORD:Docbook@123}

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT (env)
app.jwt.secret=${JWT_SECRET:LOHITH89201294728102971S67}
app.jwt.expirationMs=${JWT_EXP_MS:86400000}

# Mail (SMTP) - values from env
spring.mail.host=${SMTP_HOST:localhost}
spring.mail.port=${SMTP_PORT:1025}
spring.mail.username=${SMTP_USER:}
spring.mail.password=${SMTP_PASS:}
spring.mail.properties.mail.smtp.auth=${SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${SMTP_STARTTLS:false}

app.mail.from=${MAIL_FROM:no-reply@docbook.local}
